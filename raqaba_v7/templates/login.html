<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAQABA</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RAQABA">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<meta name="theme-color" content="#050608">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
[data-theme="dark"]{--bg:#050608;--surface:#0a0c10;--edge:#1c2030;--edge2:#242840;--txt:#e8ecf8;--txt2:#6b738f;--txt3:#2e3348;--cyan:#00e5ff;--cyan2:#0099bb;}
[data-theme="light"]{--bg:#f0f2f8;--surface:#ffffff;--edge:#dde2f0;--edge2:#c8cfe8;--txt:#111827;--txt2:#4b5680;--txt3:#9aa0bc;--cyan:#0077bb;--cyan2:#005599;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:background .3s;}
[data-theme="dark"] body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);background-size:48px 48px;}
[data-theme="dark"] body::after{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:350px;background:radial-gradient(ellipse,rgba(0,229,255,.05) 0%,transparent 70%);pointer-events:none;}
.card{background:var(--surface);border:1px solid var(--edge);border-radius:4px;padding:44px 40px;width:370px;position:relative;z-index:1;transition:background .3s,border-color .3s;}
[data-theme="dark"] .card::before{content:'';position:absolute;top:0;left:0;width:60px;height:2px;background:var(--cyan);opacity:.5;}
[data-theme="dark"] .card::after{content:'';position:absolute;top:0;left:0;width:2px;height:60px;background:var(--cyan);opacity:.5;}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.logo-icon{width:30px;height:30px;color:var(--txt);flex-shrink:0;}
.wordmark{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--txt);letter-spacing:5px;}
.wordmark span{color:var(--cyan);}
.tagline{font-size:8px;color:var(--txt3);letter-spacing:3px;text-transform:uppercase;margin-bottom:30px;}
.tabs{display:flex;gap:6px;margin-bottom:24px;}
.tab{flex:1;padding:8px;border:1px solid var(--edge);border-radius:3px;background:transparent;color:var(--txt3);font-size:9px;letter-spacing:3px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s;text-align:center;}
.tab.on{background:rgba(0,100,200,.1);border-color:var(--cyan2);color:var(--cyan);}
label{display:block;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--txt3);margin-bottom:5px;margin-top:14px;}
input{width:100%;background:var(--bg);border:1px solid var(--edge2);border-radius:3px;padding:10px 13px;color:var(--txt);font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;outline:none;transition:border-color .2s;}
input:focus{border-color:var(--cyan2);}
input::placeholder{color:var(--txt3);}
.login-btn{width:100%;margin-top:24px;background:rgba(0,150,220,.1);border:1px solid var(--cyan2);color:var(--cyan);padding:12px;border-radius:3px;font-size:9px;letter-spacing:3px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s;}
.login-btn:hover{background:rgba(0,150,220,.18);}
.err{font-size:9px;letter-spacing:1px;color:#cc1133;margin-top:10px;display:none;}
.hint{font-size:9px;color:var(--txt3);letter-spacing:.5px;margin-top:16px;line-height:1.8;}
.hint b{color:var(--txt2);}
.theme-toggle{position:absolute;top:16px;right:16px;display:flex;gap:4px;}
.th-btn{background:transparent;border:1px solid var(--edge);color:var(--txt3);padding:4px 8px;border-radius:2px;font-size:8px;letter-spacing:1px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s;}
.th-btn.on{border-color:var(--cyan2);color:var(--cyan);}
[data-lang="ar"] *{font-family:'Cairo',sans-serif !important;}
[data-lang="ar"] .card{direction:rtl;}
</style>
</head>
<body>
<div class="card">
  <div class="theme-toggle">
    <button class="th-btn on" id="btn-dark"  onclick="setTheme('dark')">Dark</button>
    <button class="th-btn"    id="btn-light" onclick="setTheme('light')">Light</button>
    <button class="th-btn on" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="th-btn"    id="btn-ar" onclick="setLang('ar')">ع</button>
  </div>
  <div class="logo-wrap">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="30" height="30" rx="5" stroke="currentColor" stroke-width="1.5" fill="none" opacity=".3"/>
      <path d="M6 16 Q16 7 26 16 Q16 25 6 16Z" stroke="var(--cyan)" stroke-width="1.5" fill="none"/>
      <circle cx="16" cy="16" r="4" fill="var(--cyan)" opacity=".9"/>
      <circle cx="16" cy="16" r="2" fill="var(--bg,#050608)"/>
      <path d="M5 5 L9 5 M5 5 L5 9" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M27 5 L23 5 M27 5 L27 9" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M5 27 L9 27 M5 27 L5 23" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M27 27 L23 27 M27 27 L27 23" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">RAQ<span>A</span>BA</div>
  </div>
  <div class="tagline" id="t-tagline">Occupancy · Emergency · Control</div>
  <div class="tabs">
    <div class="tab on" id="tab-admin" onclick="setRole('admin')" id="t-admin">Admin</div>
    <div class="tab"    id="tab-staff" onclick="setRole('staff')" id="t-staff">Staff</div>
  </div>
  <label id="t-id-lbl">Employee ID</label>
  <input id="f-id" placeholder="admin" autocomplete="off">
  <label id="t-pin-lbl">PIN Code</label>
  <input id="f-pin" type="password" placeholder="••••">
  <button class="login-btn" onclick="submit()" id="t-login-btn">// Authenticate</button>
  <div class="err" id="err"></div>
  <div class="hint" id="t-hint">Demo — Admin: <b>admin</b> / <b>1234</b><br>Demo — Staff: <b>staff</b> / <b>1234</b></div>
</div>
<script>
var role='admin';
var lang='en';
var TR={
  en:{tagline:'Occupancy · Emergency · Control',id_lbl:'Employee ID',pin_lbl:'PIN Code',login_btn:'// Authenticate',admin:'Admin',staff:'Staff',hint:'Demo — Admin: <b>admin</b> / <b>1234</b><br>Demo — Staff: <b>staff</b> / <b>1234</b>'},
  ar:{tagline:'الإشغال · الطوارئ · التحكم',id_lbl:'رقم الموظف',pin_lbl:'رمز PIN',login_btn:'// تسجيل الدخول',admin:'مدير',staff:'موظف',hint:'تجريبي — مدير: <b>admin</b> / <b>1234</b><br>موظف: <b>staff</b> / <b>1234</b>'}
};
function setTheme(th){
  document.documentElement.setAttribute('data-theme',th);
  document.getElementById('btn-dark').className='th-btn'+(th==='dark'?' on':'');
  document.getElementById('btn-light').className='th-btn'+(th==='light'?' on':'');
  localStorage.setItem('raqaba_theme',th);
}
function setLang(l){
  lang=l;
  document.documentElement.setAttribute('data-lang',l);
  document.getElementById('btn-en').className='th-btn'+(l==='en'?' on':'');
  document.getElementById('btn-ar').className='th-btn'+(l==='ar'?' on':'');
  localStorage.setItem('raqaba_lang',l);
  var tr=TR[l];
  document.getElementById('t-tagline').textContent=tr.tagline;
  document.getElementById('t-id-lbl').textContent=tr.id_lbl;
  document.getElementById('t-pin-lbl').textContent=tr.pin_lbl;
  document.getElementById('t-login-btn').textContent=tr.login_btn;
  document.getElementById('tab-admin').textContent=tr.admin;
  document.getElementById('tab-staff').textContent=tr.staff;
  document.getElementById('t-hint').innerHTML=tr.hint;
  document.querySelector('.card').style.direction=l==='ar'?'rtl':'ltr';
}
function setRole(r){
  role=r;
  document.getElementById('tab-admin').className='tab'+(r==='admin'?' on':'');
  document.getElementById('tab-staff').className='tab'+(r==='staff'?' on':'');
  document.getElementById('f-id').value=r;
}
// Init from localStorage
var savedTheme=localStorage.getItem('raqaba_theme')||'dark';
var savedLang=localStorage.getItem('raqaba_lang')||'en';
setTheme(savedTheme);
setLang(savedLang);
setRole('admin');
document.getElementById('f-pin').addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
async function submit(){
  var uid=document.getElementById('f-id').value.trim();
  var pin=document.getElementById('f-pin').value.trim();
  var err=document.getElementById('err');
  err.style.display='none';
  if(!uid||!pin){err.textContent='//'+TR[lang].id_lbl+' & PIN required';err.style.display='block';return;}
  try{
    var res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:uid,pin:pin})});
    var d=await res.json();
    if(d.ok){window.location.href='/dashboard';}
    else{err.textContent='// '+d.error;err.style.display='block';}
  }catch(e){err.textContent='// Connection error';err.style.display='block';}
}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/static/sw.js");}</script>
</body>
</html>
